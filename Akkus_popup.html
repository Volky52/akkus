function N(n){if(n===null||n===undefined||isNaN(n))return '—';n=Math.round(Number(n));if(n>=1000000)return (n/1000000).toFixed(2)+' M';return n.toLocaleString('tr-TR');}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function toast(m){let t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function barRow(label,val,max,c,sub){let p=max?Math.max(0,Math.min(100,val/max*100)):0;return `<div class="bi"><div class="bh"><span class="bn">${esc(label)}</span><span class="bv" style="color:${c}">${N(val)}${sub||''}</span></div><div class="bt"><div class="bf" style="width:${p}%;background:${c}"></div></div></div>`}
function svgPie(labels,values){let sum=values.reduce((a,b)=>a+Number(b||0),0)||1, cx=105, cy=105, r=72, ang=-Math.PI/2, paths='';values.forEach((v,i)=>{let a2=ang+(v/sum)*Math.PI*2;let x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);let large=(a2-ang)>Math.PI?1:0;paths+=`<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${CC[i%CC.length]}" stroke="#fff"/>`;ang=a2;});let legend=labels.map((l,i)=>`<div style="display:flex;align-items:center;gap:5px;font-size:9px;min-width:0"><span style="width:9px;height:9px;border-radius:2px;background:${CC[i%CC.length]};display:inline-block;flex:0 0 auto"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l)}</span></div>`).join('');return `<div class="chart" style="display:grid;grid-template-columns:220px 1fr;align-items:center;padding:6px"><svg viewBox="0 0 210 210" width="100%" height="100%">${paths}<circle cx="105" cy="105" r="38" fill="#fbfdf9"/></svg><div style="min-width:0;display:grid;gap:3px">${legend}</div></div>`}
function svgBars(labels,values,color){let max=Math.max(...values,1);let rows=labels.map((l,i)=>barRow(l,values[i],max,color||CC[i%CC.length],''));return `<div class="rank">${rows.join('')}</div>`}

function tab(t,btn){popTab=t;document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render(t)}
function simpleBars(data){if(!data||!data.length)return '<p class="hint">Veri yok</p>';let mx=Math.max(...data.map(p=>p['Üretim Miktarı (Ton)']||0),1);return data.map((p,i)=>barRow(p['Ürün'],p['Üretim Miktarı (Ton)']||0,mx,CC[i%CC.length],` t<br><span style="font-size:8px;color:#888">${N(p['Üretim Alanı (Dekar)']||0)} da</span>`)).join('')}
function render(tid){let el=document.getElementById('pbody'), name=DISTRICT, b=B[name]||{}, lv=H[name]||{groups:{}}, gt=lv.group_totals||{}, la=L[name]||{};if(tid==='pb'){let data=b.top8||[], groups=['Meyveler','Sebzeler','Tarla Bitkileri'];let gsum=groups.map((g,i)=>{let gd=(b.by_group||{})[g]||{};return `<div class="mini"><div class="mv" style="color:${CC[i]}">${N(gd.prod||0)} t</div><div class="ml">${N(gd.area||0)} da</div><div class="ml">${g}</div></div>`}).join('');el.innerHTML=`<div class="pcol"><div class="psect">🌾 Tüm Ürünler — Üretim ve Alan</div>${simpleBars(data)}<div class="psect">Üretim Dağılımı</div>${svgPie(data.map(p=>p['Ürün']),data.map(p=>p['Üretim Miktarı (Ton)']))}<div class="psect">Alan (Dekar)</div>${svgBars(data.slice().sort((a,b)=>(b['Üretim Alanı (Dekar)']||0)-(a['Üretim Alanı (Dekar)']||0)).map(p=>p['Ürün']),data.slice().sort((a,b)=>(b['Üretim Alanı (Dekar)']||0)-(a['Üretim Alanı (Dekar)']||0)).map(p=>p['Üretim Alanı (Dekar)']||0),CC[1])}</div><div class="pcol"><div class="psect">Grup Özeti</div><div class="grid3">${gsum}</div><div class="psect">Meyveler Top 5</div>${simpleBars(((b.by_group||{})['Meyveler']||{top8:[]}).top8.slice(0,5))}<div class="psect">Sebzeler Top 5</div>${simpleBars(((b.by_group||{})['Sebzeler']||{top8:[]}).top8.slice(0,5))}<div class="psect">Tarla Bitkileri Top 5</div>${simpleBars(((b.by_group||{})['Tarla Bitkileri']||{top8:[]}).top8.slice(0,5))}</div>`;}
else if(['pbb','pkb','pkt','par'].includes(tid)){let map={pbb:'Büyükbaş',pkb:'Küçükbaş',pkt:'Kanatlı',par:'Arıcılık'}, grp=map[tid];let items=(lv.groups||{})[grp]||[], main=items.filter(x=>!x.c.includes('İşletme'));let key=grp==='Arıcılık'?'Kovan Sayıları (adet)':null;let total=grp==='Arıcılık'?(items.find(x=>x.c.includes('Kovan'))?.a||0):(gt[grp]||0);let all=Object.keys(B).map(n=>{let h=H[n]||{groups:{},group_totals:{}};let v=grp==='Arıcılık'?((h.groups['Arıcılık']||[]).find(x=>x.c.includes('Kovan'))?.a||0):(h.group_totals[grp]||0);return {n,v}}).sort((a,b)=>b.v-a.v);let rank=all.findIndex(x=>x.n===name)+1;let mx=Math.max(...main.map(x=>x.a),1);let bars=main.map((x,i)=>barRow(x.c.replace(' (adet)','').replace(' (ton) ','(T)'),x.a,mx,CC[i%CC.length])).join('');el.innerHTML=`<div class="pcol"><div class="psect">${grp} — Cins Detayı</div><div class="mini" style="margin-bottom:8px"><div class="mv" style="font-size:21px;color:${CC[3]}">${N(total)}</div><div class="ml">Toplam ${grp==='Arıcılık'?'Kovan':'Adet'} · İl Sırası: #${rank}</div>${grp==='Arıcılık'?`<div class="mv" style="color:${CC[1]};margin-top:5px">${N(items.find(x=>x.c.includes('İşletme'))?.a||0)}</div><div class="ml">İşletme Sayısı</div>`:''}</div>${bars}<div class="psect">Cins Dağılımı</div>${svgPie(main.map(x=>x.c.replace(' (adet)','')),main.map(x=>x.a))}</div><div class="pcol"><div class="psect">En Fazla Olan İlçeler — ${grp}</div>${svgBars(all.map(x=>x.n),all.map(x=>x.v),CC[3])}<div class="psect">Top 8 İlçe Karşılaştırması</div>${svgBars(all.slice(0,8).map(x=>x.n),all.slice(0,8).map(x=>x.v),CC[0])}</div>`;}
else{let ent=Object.entries(la).sort((a,b)=>b[1]-a[1]);let tot=ent.reduce((s,e)=>s+e[1],0)||1;let mx=Math.max(...ent.map(e=>e[1]),1);let bars=ent.map((e,i)=>barRow(e[0],e[1],mx,CC[i%CC.length],` (%${(e[1]/tot*100).toFixed(1)})`)).join('');let all=Object.keys(L).map(n=>({n,v:Object.values(L[n]).reduce((s,v)=>s+v,0)})).sort((a,b)=>b.v-a.v);el.innerHTML=`<div class="pcol"><div class="psect">🗺 Arazi Varlığı (Dekar)</div>${bars}<div class="mini"><div class="mv" style="color:${CC[0]}">${N(tot)} dekar</div><div class="ml">Toplam Alan</div></div></div><div class="pcol"><div class="psect">Arazi Kullanım Dağılımı</div>${svgPie(ent.map(e=>e[0]),ent.map(e=>e[1]))}<div class="psect">İl Geneli Toplam Alan Sıralaması</div>${svgBars(all.map(x=>x.n),all.map(x=>x.v),CC[5])}</div>`;}}
function downloadCSV(){let rows=[];let name=DISTRICT,b=B[name]||{},lv=H[name]||{groups:{}},la=L[name]||{};if(popTab==='pb'){rows.push(['İlçe','Grup','Ürün','Alan(Da)','Üretim(T)']);Object.entries(b.by_group||{}).forEach(([g,o])=>(o.top8||[]).forEach(p=>rows.push([name,g,p['Ürün'],p['Üretim Alanı (Dekar)'],p['Üretim Miktarı (Ton)']])));}else if(popTab==='pl'){rows.push(['İlçe','Alan Türü','Alan(Da)']);Object.entries(la).forEach(e=>rows.push([name,e[0],e[1]]));}else{let map={pbb:'Büyükbaş',pkb:'Küçükbaş',pkt:'Kanatlı',par:'Arıcılık'},grp=map[popTab];rows.push(['İlçe','Grup','Cins','Adet']);((lv.groups||{})[grp]||[]).forEach(x=>rows.push([name,grp,x.c,x.a]));}let csv='﻿'+rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(';')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=name+'_'+popTab+'.csv';a.click();toast('Excel uyumlu CSV indirildi')}
init();
</script></body></html>
